<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Header Traverso · Backup pre-V18 (2026-04-26)</title>
<style>
:root{
  --color-primary:#0B1E6B;--color-primary-dark:#081450;
  --color-accent:#C5A55A;--color-accent-saturated:#C9A227;
  --color-text:#19212F;
  --shadow-sm:0 2px 8px rgba(11,30,107,0.06);
  --text-xs:0.7rem;
  --font-heading:"Libre Baskerville",Georgia,serif;
  --font-body:"Source Sans 3",system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-body);min-height:200vh;padding-top:200px;background:#0B1E6B}

/* ============================================================
   HEADER · estado pre-V18 (sin cinta dorada superior)
   Backup creado 2026-04-26 — estructura conservada para reversion
============================================================ */
.header{
  position:fixed;
  top:0;left:0;right:0;
  z-index:100;
  background:transparent;
  transition:background 0.6s cubic-bezier(0.4,0,0.2,1),box-shadow 0.6s cubic-bezier(0.4,0,0.2,1);
}
.header.scrolled{
  background:rgba(255,255,255,0.97);
  box-shadow:var(--shadow-sm);
}
.header.scrolled .header__link{color:var(--color-text)}
.header.scrolled .header__link:hover{color:var(--color-primary)}
.header__inner{
  display:flex;align-items:center;justify-content:space-between;
  position:relative;padding:1rem clamp(1.5rem,3vw,2.5rem);
  max-width:100%;
}
.header__logo{display:flex;align-items:center}
.header__logo img{
  height:30px;width:auto;
  filter:brightness(0) invert(1);
  transition:filter 0.6s cubic-bezier(0.4,0,0.2,1);
}
.header.scrolled .header__logo img{filter:none}
.header__nav{position:absolute;left:50%;transform:translateX(-50%)}
.header__list{display:flex;gap:2rem;list-style:none}
.header__link{
  font-family:var(--font-body);font-size:0.85rem;font-weight:500;
  color:rgba(255,255,255,0.85);text-decoration:none;position:relative;padding:0.4rem 0;
  transition:color 0.3s ease;
}
.header__link::after{
  content:"";position:absolute;left:0;bottom:0;width:0;height:1px;
  background:var(--color-accent-saturated);transition:width 0.3s ease;
}
.header__link:hover::after,.header__link--active::after{width:100%}
.header__cta{
  font-family:"Courier New",monospace;font-size:0.7rem;letter-spacing:0.18em;
  text-transform:uppercase;font-weight:600;padding:9px 18px;
  background:var(--color-accent-saturated);color:#fff;border-radius:2px;
  text-decoration:none;
}
</style>
</head>
<body>

<header class="header" id="header">
  <div class="header__inner">
    <a href="index.html" class="header__logo" aria-label="Traverso International Foods">
      <img src="../assets/logo-traverso.png" alt="Traverso International Foods" width="180" height="50">
    </a>
    <nav class="header__nav" aria-label="Navegación principal">
      <ul class="header__list">
        <li><a href="index.html" class="header__link header__link--active">Inicio</a></li>
        <li><a href="quienes-somos.html" class="header__link">Quiénes Somos</a></li>
        <li><a href="productos.html" class="header__link">Productos</a></li>
        <li><a href="contacto.html" class="header__link">Contacto</a></li>
      </ul>
    </nav>
    <a href="contacto.html" class="header__cta">Conversemos</a>
  </div>
</header>

<!-- Snapshot estructural del header de index.html justo antes de aplicar V18 (cinta dorada superior).
     Estado: 2026-04-26 · stack GSAP 3.13 + ScrollTrigger + SplitText, scroll-based reveal de logo+CTA -->

</body>
</html>
